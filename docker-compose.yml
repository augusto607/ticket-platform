services:
  backend:
    build:
      context: ./backend
    container_name: ticket_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount backend source code into the container for development
      - ./backend:/app
    depends_on:
      # Start the database service before the backend
      - db

  db:
    image: postgres:16
    container_name: ticket_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      # Persist PostgreSQL data so it survives container recreation
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: